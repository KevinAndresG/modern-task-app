<div
  class="relative min-h-screen"
  style="background: var(--clay-bg); transition: background 0.35s ease"
>
  <app-header
    [taskCount]="totalTasks().length"
    [isDark]="isDark()"
    (themeToggle)="toggleTheme()"
  />

  <!-- Page body: sidebar + main -->
  <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex flex-col lg:flex-row gap-6 items-start">
      <!-- Sidebar: Task Form -->
      <aside
        class="w-full lg:w-72 xl:w-80 flex-shrink-0 lg:sticky lg:top-24 order-last lg:order-first"
      >
        <app-task-form (taskCreated)="onTaskCreated()" />
      </aside>

      <!-- Main content -->
      <div class="flex-1 min-w-0 space-y-6">
        <app-task-stats />
        <app-task-calendar
          [activeDate]="activeCellDate()"
          (dateSelected)="onDateSelected($event)"
        />

        @defer (when true; prefetch on idle) {
          <app-task-list />
        } @loading {
          <div class="space-y-3">
            @for (item of [1, 2, 3]; track $index) {
              <div class="clay-card-flat">
                <div class="h-5 rounded-xl w-3/4 mb-3 skeleton-glass"></div>
                <div class="h-4 rounded-xl w-full mb-2 skeleton-glass"></div>
                <div class="h-4 rounded-xl w-2/3 skeleton-glass"></div>
              </div>
            }
          </div>
        } @placeholder {
          <div class="text-center py-12 text-muted text-sm font-medium">Loading tasks…</div>
        } @error {
          <div class="clay-card text-center py-12">
            <p style="color: #fda4af" class="font-semibold">Failed to load tasks</p>
          </div>
        }
      </div>
    </div>
  </div>

  <!-- Calendar quick-add popover -->
  <app-task-popover
    [state]="popoverState()"
    (taskCreated)="onTaskCreated()"
    (closed)="onPopoverClose()"
    (moreOptions)="onPopoverMoreOptions($event)"
  />

  <!-- Full modal (opened from popover "More options" or directly) -->
  <app-task-modal
    [prefillDate]="modalDate()"
    (taskCreated)="onTaskCreated()"
    (closed)="onModalClose()"
  />

  <!-- Toast notifications -->
  <app-toast />
</div>
